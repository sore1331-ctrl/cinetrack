<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineTrack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Minimal header -->
  <header>
    <h1>CineTrack</h1>
    <div id="sync-indicator" class="sync-indicator" data-state="loading" title="Loading…"></div>
    <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">🌙</button>
  </header>

  <!-- Type tab bar -->
  <div class="type-tabs-bar">
    <div class="type-tabs-inner">
      <button class="type-tab active" data-type="movie">🎬 Films</button>
      <button class="type-tab" data-type="tv">📺 TV Shows</button>
      <button class="type-tab" data-type="anime">🎌 Anime</button>
    </div>
  </div>

  <main>
    <!-- Single controls row -->
    <section class="controls">
      <div class="status-tabs">
        <button class="status-btn active" data-status="all">All</button>
        <button class="status-btn" data-status="watched">✓ Watched</button>
        <button class="status-btn" data-status="watchlist">⏳ List</button>
      </div>
      <input type="text" id="search-input" placeholder="Search titles, genres, directors..." />
      <select id="country-filter">
        <option value="">All Countries</option>
      </select>
      <div class="size-toggle">
        <button class="size-btn" data-size="sm">S</button>
        <button class="size-btn active" data-size="md">M</button>
        <button class="size-btn" data-size="lg">L</button>
      </div>
      <button id="select-mode-btn" class="select-mode-btn" title="Toggle selection mode">☑ Select</button>
      <select id="page-size-select" class="page-size-select" title="Items per page">
        <option value="50">50 / pg</option>
        <option value="100">100 / pg</option>
        <option value="150">150 / pg</option>
        <option value="200">200 / pg</option>
        <option value="300">300 / pg</option>
      </select>
      <div class="import-wrap">
        <button id="import-btn" title="Import CSV">⬆ CSV</button>
        <input type="file" id="csv-input" accept=".csv,text/csv" style="display:none" />
        <a id="csv-template" href="#" download="cinetrack-template.csv">template</a>
      </div>
      <button id="add-btn">+ Add</button>
    </section>

    <!-- Stats bar -->
    <div id="stats-bar" class="stats-bar"></div>

    <!-- Import result toast -->
    <div id="import-toast" class="import-toast hidden"></div>

    <!-- Bulk action bar -->
    <div id="bulk-bar" class="bulk-bar hidden">
      <span id="bulk-count">0 selected</span>
      <div class="bulk-actions">
        <button id="bulk-mark-watched" class="bulk-watched">✓ Mark Watched</button>
        <button id="bulk-mark-watchlist" class="bulk-watchlist">⏳ Mark Watchlist</button>
        <span class="bulk-divider"></span>
        <button id="bulk-select-all">Select all</button>
        <button id="bulk-deselect">Deselect</button>
        <span class="bulk-divider"></span>
        <button id="bulk-delete" class="danger">🗑 Delete</button>
      </div>
    </div>

    <!-- TMDB matching progress overlay -->
    <div id="import-progress" class="import-progress hidden">
      <div class="import-progress-card">
        <h3>Matching with TMDB</h3>
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar" style="width:0%"></div>
        </div>
        <p id="progress-text">Starting…</p>
        <button id="progress-cancel" class="secondary">Cancel</button>
      </div>
    </div>

    <div id="movie-grid" class="movie-grid grid-md"></div>
    <p id="empty-msg" class="empty-msg hidden">No titles found. Add one!</p>

    <div id="pagination" class="pagination hidden"></div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h2 id="modal-title">Add Title</h2>

      <div class="type-toggle" id="type-toggle">
        <button type="button" class="type-btn active" data-type="movie">🎬 Movie</button>
        <button type="button" class="type-btn" data-type="tv">📺 TV Show</button>
        <button type="button" class="type-btn" data-type="anime">🎌 Anime</button>
      </div>

      <form id="movie-form">
        <div class="tmdb-search-wrap" id="tmdb-search-wrap">
          <label id="tmdb-search-label">Search TMDB
            <div class="search-field-wrap">
              <input type="text" id="tmdb-query" placeholder="Type a title..." autocomplete="off" />
              <div id="tmdb-dropdown" class="tmdb-dropdown hidden"></div>
            </div>
          </label>
          <div id="tmdb-selected" class="tmdb-selected hidden">
            <img id="tmdb-poster-thumb" src="" alt="" />
            <div class="tmdb-selected-info">
              <strong id="tmdb-selected-title"></strong>
              <span id="tmdb-selected-year"></span>
            </div>
            <button type="button" id="tmdb-clear" title="Clear selection">✕</button>
          </div>
          <div id="tmdb-searching" class="tmdb-status hidden">Searching…</div>
          <div id="tmdb-error" class="tmdb-status error hidden"></div>
        </div>

        <div id="manual-fields">
          <label>Title *
            <input type="text" id="f-title" required placeholder="e.g. Inception" />
          </label>
          <div class="row-2">
            <label>Year
              <input type="number" id="f-year" min="1888" max="2099" placeholder="e.g. 2010" />
            </label>
            <label>Country
              <input type="text" id="f-country" placeholder="e.g. United States" />
            </label>
          </div>
          <div class="row-2">
            <label>Genre
              <input type="text" id="f-genre" placeholder="e.g. Sci-Fi" />
            </label>
            <label id="director-label">Director
              <input type="text" id="f-director" placeholder="e.g. Christopher Nolan" />
            </label>
          </div>
        </div>

        <label>Status
          <select id="f-status">
            <option value="watchlist">Watchlist</option>
            <option value="watched">Watched</option>
          </select>
        </label>
        <label id="rating-label" class="hidden">Rating (1–10)
          <div class="star-row" id="star-row"></div>
        </label>
        <label>Runtime (minutes)
          <input type="number" id="f-runtime" min="0" max="99999" placeholder="e.g. 148 (filled from TMDB)" />
        </label>
        <label>Notes
          <textarea id="f-notes" rows="3" placeholder="Your thoughts..."></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="secondary">Cancel</button>
          <button type="submit" id="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-card small">
      <h2>Remove Title?</h2>
      <p id="confirm-msg"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="secondary">Cancel</button>
        <button id="confirm-ok" class="danger">Remove</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
