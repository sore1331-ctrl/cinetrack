<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineTrack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth overlay -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>CineTrack</h1>
        <p>Your personal film &amp; TV tracker</p>
      </div>
      <div id="auth-loading" class="auth-loading">
        <div class="auth-spinner"></div>
        <p>Connecting…</p>
      </div>
      <div id="auth-form-wrap" class="hidden">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="signin">Sign In</button>
          <button class="auth-tab" data-tab="signup">Create Account</button>
        </div>
        <form id="auth-form" autocomplete="on">
          <label>Email
            <input type="email" id="auth-email" required autocomplete="email" placeholder="you@example.com" />
          </label>
          <label>Password
            <input type="password" id="auth-password" required autocomplete="current-password" placeholder="••••••••" minlength="6" />
          </label>
          <p id="auth-error" class="auth-error hidden"></p>
          <button type="submit" id="auth-submit" class="auth-submit">Sign In</button>
        </form>
        <p id="auth-success" class="auth-success hidden"></p>
        <button id="auth-offline" class="auth-offline-btn">Continue without account</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <h1 id="logo" title="Go to Profile">CineTrack</h1>
    <div class="header-actions">
      <div id="user-menu" class="user-menu hidden">
        <button class="user-avatar-btn" id="user-avatar-btn">
          <span id="user-avatar">?</span>
        </button>
        <div class="user-dropdown hidden" id="user-dropdown">
          <div class="user-name-row">
            <span id="username-display" class="username-display">Set username</span>
            <button id="username-edit-btn" class="username-edit-btn" title="Edit username">✏</button>
          </div>
          <div id="username-form" class="username-form hidden">
            <input type="text" id="username-input" placeholder="Your display name" maxlength="30" />
            <button id="username-save-btn" class="username-save-btn">Save</button>
          </div>
          <span id="user-email" class="user-email-label"></span>
          <hr class="dropdown-divider" />
          <button id="reload-cloud-btn" class="reload-cloud-btn" title="Fetch your latest data from the cloud and replace local data. Use this if changes from another device aren't showing up.">↻ Reload from cloud</button>
          <button id="signout-btn" class="signout-btn">Sign out</button>
        </div>
      </div>
      <button id="header-profile-btn" class="header-profile-btn" title="Profile">👤</button>
      <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">🌙</button>
    </div>
  </header>

  <!-- Type tab bar -->
  <div class="type-tabs-bar">
    <div class="type-tabs-inner">
      <button class="type-tab active" data-type="movie">🎬 Films</button>
      <button class="type-tab" data-type="tv">📺 TV Shows</button>
      <button class="type-tab" data-type="anime">🎌 Anime</button>
      <button class="type-tab" data-type="stats">📊 Stats</button>
      <button class="type-tab" data-type="community">👥 Community</button>
    </div>
  </div>

  <main>
    <!-- Controls row (hidden on stats/community) -->
    <section class="controls">
      <div class="status-tabs">
        <button class="status-btn active" data-status="all">All</button>
        <button class="status-btn" data-status="watched">✓ Watched</button>
        <button class="status-btn" data-status="in_progress">▶ In Progress</button>
        <button class="status-btn" data-status="watchlist">⏳ List</button>
      </div>
      <input type="text" id="search-input" placeholder="Search titles, genres, directors..." />
      <select id="country-filter">
        <option value="">All Countries</option>
      </select>
      <div class="size-toggle">
        <button class="size-btn" data-size="sm">S</button>
        <button class="size-btn active" data-size="md">M</button>
        <button class="size-btn" data-size="lg">L</button>
      </div>
      <button id="select-mode-btn" class="select-mode-btn" title="Toggle selection mode">☑ Select</button>
      <select id="page-size-select" class="page-size-select" title="Items per page">
        <option value="50">50 / pg</option>
        <option value="100">100 / pg</option>
        <option value="150">150 / pg</option>
        <option value="200">200 / pg</option>
        <option value="300">300 / pg</option>
      </select>
      <button id="add-btn">+ Add</button>
    </section>

    <input type="file" id="csv-input" accept=".csv,text/csv" style="display:none" />

    <div id="stats-bar" class="stats-bar"></div>
    <div id="import-toast" class="import-toast hidden"></div>

    <!-- Bulk action bar -->
    <div id="bulk-bar" class="bulk-bar hidden">
      <span id="bulk-count">0 selected</span>
      <div class="bulk-actions">
        <button id="bulk-mark-watched" class="bulk-watched">✓ Mark Watched</button>
        <button id="bulk-mark-in-progress" class="bulk-in-progress">▶ Mark In Progress</button>
        <button id="bulk-mark-watchlist" class="bulk-watchlist">⏳ Mark Watchlist</button>
        <span class="bulk-divider"></span>
        <button id="bulk-select-all">Select all</button>
        <button id="bulk-deselect">Deselect</button>
        <span class="bulk-divider"></span>
        <button id="bulk-delete" class="danger">🗑 Delete</button>
      </div>
    </div>

    <!-- TMDB matching progress overlay -->
    <div id="import-progress" class="import-progress hidden">
      <div class="import-progress-card">
        <h3>Matching with TMDB</h3>
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar" style="width:0%"></div>
        </div>
        <p id="progress-text">Starting…</p>
        <button id="progress-cancel" class="secondary">Cancel</button>
      </div>
    </div>

    <!-- Content grid -->
    <div id="movie-grid" class="movie-grid grid-md"></div>
    <p id="empty-msg" class="empty-msg hidden">No titles found. Add one!</p>
    <div id="pagination" class="pagination hidden"></div>

    <!-- Stats panel -->
    <div id="stats-panel" class="stats-panel hidden"></div>

    <!-- Profile panel -->
    <div id="profile-panel" class="profile-panel hidden"></div>

    <!-- Community panel -->
    <div id="community-panel" class="community-panel hidden">
      <div class="community-top">
        <h2>Community</h2>
        <div class="sharing-label">
          <span>Share my watchlist</span>
          <label class="toggle-switch">
            <input type="checkbox" id="sharing-toggle" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </div>
      <div id="community-grid" class="community-grid"></div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h2 id="modal-title">Add Title</h2>
      <div class="type-toggle" id="type-toggle">
        <button type="button" class="type-btn active" data-type="movie">🎬 Movie</button>
        <button type="button" class="type-btn" data-type="tv">📺 TV Show</button>
        <button type="button" class="type-btn" data-type="anime">🎌 Anime</button>
      </div>
      <form id="movie-form">
        <div class="tmdb-search-wrap" id="tmdb-search-wrap">
          <label id="tmdb-search-label">Search TMDB
            <div class="search-field-wrap">
              <input type="text" id="tmdb-query" placeholder="Type a title..." autocomplete="off" />
              <div id="tmdb-dropdown" class="tmdb-dropdown hidden"></div>
            </div>
          </label>
          <div id="tmdb-selected" class="tmdb-selected hidden">
            <img id="tmdb-poster-thumb" src="" alt="" />
            <div class="tmdb-selected-info">
              <strong id="tmdb-selected-title"></strong>
              <span id="tmdb-selected-year"></span>
            </div>
            <button type="button" id="tmdb-clear" title="Clear selection">✕</button>
          </div>
          <div id="tmdb-searching" class="tmdb-status hidden">Searching…</div>
          <div id="tmdb-error" class="tmdb-status error hidden"></div>
        </div>
        <div id="manual-fields">
          <label>Title *
            <input type="text" id="f-title" required placeholder="e.g. Inception" />
          </label>
          <div class="row-2">
            <label>Year
              <select id="f-year"><option value="">— Year —</option></select>
            </label>
            <label>Country
              <input type="text" id="f-country" placeholder="e.g. United States" list="country-datalist" autocomplete="off" />
              <datalist id="country-datalist">
                <option value="United States"></option><option value="United Kingdom"></option>
                <option value="Japan"></option><option value="France"></option>
                <option value="Germany"></option><option value="South Korea"></option>
                <option value="Italy"></option><option value="Spain"></option>
                <option value="China"></option><option value="India"></option>
                <option value="Australia"></option><option value="Canada"></option>
                <option value="Brazil"></option><option value="Mexico"></option>
                <option value="Argentina"></option><option value="Russia"></option>
                <option value="Sweden"></option><option value="Denmark"></option>
                <option value="Norway"></option><option value="Finland"></option>
                <option value="Poland"></option><option value="Czech Republic"></option>
                <option value="Hungary"></option><option value="Romania"></option>
                <option value="Austria"></option><option value="Switzerland"></option>
                <option value="Belgium"></option><option value="Netherlands"></option>
                <option value="Portugal"></option><option value="Greece"></option>
                <option value="Turkey"></option><option value="Israel"></option>
                <option value="Iran"></option><option value="Egypt"></option>
                <option value="Nigeria"></option><option value="South Africa"></option>
                <option value="Morocco"></option><option value="Kenya"></option>
                <option value="Ethiopia"></option><option value="Ghana"></option>
                <option value="Thailand"></option><option value="Vietnam"></option>
                <option value="Indonesia"></option><option value="Malaysia"></option>
                <option value="Philippines"></option><option value="Taiwan"></option>
                <option value="Hong Kong"></option><option value="Singapore"></option>
                <option value="Pakistan"></option><option value="Bangladesh"></option>
                <option value="Sri Lanka"></option><option value="New Zealand"></option>
                <option value="Ireland"></option><option value="Serbia"></option>
                <option value="Croatia"></option><option value="Ukraine"></option>
                <option value="Kazakhstan"></option><option value="Colombia"></option>
                <option value="Chile"></option><option value="Peru"></option>
                <option value="Venezuela"></option><option value="Cuba"></option>
                <option value="Jordan"></option><option value="Saudi Arabia"></option>
                <option value="Iraq"></option><option value="Lebanon"></option>
                <option value="Algeria"></option><option value="Tunisia"></option>
                <option value="Senegal"></option><option value="Cambodia"></option>
              </datalist>
            </label>
          </div>
          <div class="row-2">
            <label>Genre
              <input type="text" id="f-genre" placeholder="e.g. Sci-Fi" />
            </label>
            <label id="director-label">Director
              <input type="text" id="f-director" placeholder="e.g. Christopher Nolan" />
            </label>
          </div>
        </div>
        <label>Status
          <select id="f-status">
            <option value="watchlist">Watchlist</option>
            <option value="in_progress">▶ In Progress</option>
            <option value="watched">Watched</option>
          </select>
        </label>
        <label id="rating-label" class="hidden">Rating (1–10)
          <div class="star-row" id="star-row"></div>
        </label>
        <label>Runtime (minutes)
          <input type="number" id="f-runtime" min="0" max="99999" placeholder="e.g. 148 (filled from TMDB)" />
        </label>
        <label>Notes
          <textarea id="f-notes" rows="5" placeholder="Your thoughts..."></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="secondary">Cancel</button>
          <button type="submit" id="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-card small">
      <h2>Remove Title?</h2>
      <p id="confirm-msg"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="secondary">Cancel</button>
        <button id="confirm-ok" class="danger">Remove</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
